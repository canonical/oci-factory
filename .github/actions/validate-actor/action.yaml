name: Validate Access
description: 'Check if the workflow is triggered by an admin user'

# This callable workflow checks if the workflow is triggered by
# a code owner or an image maintainer by testing the github.actor
# variable against the CODEOWNERS file and the contacts.yaml file
# under oci/* path. The result is exposed via the `permitted` output;
# callers are expected to gate downstream steps on it (typically via
# `enforce-actor-permitted`).

inputs:
  admin-only:
    description: 'The protected workflow should only be triggered as a code owner or an image maintainer'
    required: true
    default: 'false'
  image-path:
    description: 'The path to the image to be built'
    required: true
  github-token:
    description: 'The GITHUB_TOKEN for the GitHub CLI'
    required: true

outputs:
  permitted:
    description: "'true' when the actor is permitted; 'false' otherwise."
    value: ${{ steps.check.outputs.permitted }}

runs:
  using: "composite"
  steps:
    - name: Check if the workflow is triggered by an admin user
      id: check
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        if ./.github/actions/validate-actor/validate-actor.sh \
            "${{ github.actor }}" "${{ inputs.admin-only }}" \
            "${{ github.workspace }}" "${{ inputs.image-path }}"; then
          echo "permitted=true" >> "$GITHUB_OUTPUT"
        else
          echo "permitted=false" >> "$GITHUB_OUTPUT"
        fi
