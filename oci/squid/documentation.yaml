version: 2

application: Squid
website: http://www.squid-cache.org
source-code: https://github.com/canonical/squid-rock
issues: https://github.com/canonical/squid-rock/issues
description: |
  Squid is a caching proxy for the Web supporting HTTP, HTTPS, FTP, and more.
  It reduces bandwidth and improves response times by caching and reusing
  frequently-requested web pages. Squid has extensive access controls and
  makes a great server accelerator. It runs on most available operating systems,
  including Windows and is licensed under the GNU GPL.

docker:
  parameters: >-
    -p 3128:3128
  run_conclusion: |
    Access the Squid proxy at `localhost:3128`.

config:
  TZ:
    type: env
    description: Timezone.
    default: UTC
  '`-v <path>:/var/log/squid`':
    type: mount
    description: Volume to store squid logs.
  '`-v <path>:/var/spool/squid`':
    type: mount
    description: Volume to store the squid cache.
  '`-v <path>:/etc/squid/squid.conf`':
    type: mount
    description: Main squid configuration file.
  '`-v <path>:/etc/squid/conf.d/snippet.conf`':
    type: mount
    description: Configuration snippets included by squid.conf.
  '`-p <port>:3128`':
    type: port
    description: Expose the container's port `3128` on the host's `<port>`.

microk8s:
  deploy:
    link: https://git.launchpad.net/~ubuntu-docker-images/ubuntu-docker-images/+git/squid/plain/examples/squid-deployment.yml?h=6.1-23.10
    access: |
      Access the Squid proxy on port 3128.
  configmap:
    files:
      - key: squid-config
        name: squid.conf
        link: https://git.launchpad.net/~ubuntu-docker-images/ubuntu-docker-images/+git/squid/plain/examples/config/squid.conf?h=6.1-23.10

