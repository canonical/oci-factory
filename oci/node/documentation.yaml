version: 2

application: Nodejs
description: |
  Node.js is a free, open-source, cross-platform JavaScript runtime
  environment that lets developers create servers, web apps, command line
  tools and scripts.
  This image is a chiselled Node.js rock that only contains the Node.js
  runtime.
website: https://nodejs.org/en
issues: https://github.com/canonical/node-rock/issues
source-code: https://github.com/canonical/node-rock

docker:
  run_cmd: --version
  parameters: >-
    --rm
  run_conclusion: |
    The container prints the Node.js version to STDOUT and exits.
