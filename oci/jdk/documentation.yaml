version: 2
application: jdk
description: |
  OpenJDK is the official reference implementation of Java SE since
  version 7. [Read more](https://openjdk.org/).
  This image packs the Java Development Kit, coming
  from the [OpenJDK project](https://www.openjdk.org/), a free and open
  source implementation of the Java Platform, Standard Edition (Java SE).
 
  Java is a registered trademark of Oracle and/or its affiliates.

website: https://openjdk.org/
issues: https://github.com/canonical/jdk-rock/issues
source-code: https://github.com/canonical/jdk-rock

docker:
  parameters: >-
    --rm
    -v /path/to/dir/contains/HelloWorld.java:/work
    -w /work
  run_cmd: exec java HelloWorld.java
  run_conclusion: |
    JDK starts and runs the Hello World Java application as defined below, and outputs `"Hello, World"` to the terminal.
    
    ```java
    // HelloWorld.java
    class HelloWorld
    {
        public static void main(String args[])
        {
            System.out.println("Hello, World");
        }
    }
    ```

config:
  '`TZ`':
    type: env
    description: Timezone.
    default: 'UTC'
  '`exec java [options] <args>`':
    type: app
    description: Java runtime command.
