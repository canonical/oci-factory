version: 1
# --- OVERVIEW INFORMATION ---
application: litmuschaos-operator
description: >
  Litmus Chaos Operator is a Kubernetes operator that orchestrates chaos experiments
  for the LitmusChaos platform. It manages the lifecycle of ChaosEngine resources
  and schedules chaos experiments defined by ChaosExperiment custom resources.
  Read more in the [official documentation](https://github.com/litmuschaos/litmus).
  Please note that this repository holds a rock instead of a Dockerfile-based image.
  As such, the entrypoint is Pebble.
  Read more in the [Rockcraft docs](https://canonical-rockcraft.readthedocs-hosted.com/en/latest/).
debug:
  text: |
    ### Debugging

    To inspect the running service:
    ```bash
    docker exec -it <container> pebble logs -f chaos-operator
    ```
