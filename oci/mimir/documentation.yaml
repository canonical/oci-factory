version: 2

application: mimir
description: |
  Mimir is an open source, horizontally scalable, highly available,
  multi-tenant TSDB for long-term storage for Mimir.
  Read more in the [official website](https://grafana.com/oss/mimir/).
website: https://grafana.com/oss/mimir/
issues: https://github.com/canonical/mimir-rock/issues
source-code: https://github.com/canonical/mimir-rock

docker:
  parameters: >-
    -e TZ=UTC
    -p 9009:9009
  run_conclusion: |
    Mimir starts on port 9009.
    Access the instance at http://localhost:9009.

config:
  TZ:
    type: env
    description: Timezone.
    default: 'UTC'
  '`-p <port>:9009`':
    type: port
    description: Expose port 9009 on the host.
