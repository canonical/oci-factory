version: 2

application: node-exporter
description: |
  Node-exporter exposes machine metrics in Prometheus format.
website: https://github.com/prometheus/node_exporter
issues: https://github.com/canonical/node-exporter-rock/issues
source-code: https://github.com/canonical/node-exporter-rock

docker:
  parameters: >-
    -e TZ=UTC
    -p 9100:9100
  run_conclusion: |
    Access the metrics endpoint at http://localhost:9100/metrics.

config:
  TZ:
    type: env
    description: Timezone.
    default: 'UTC'
  '`-p <port>:9100`':
    type: port
    description: Expose the container's port `9100` on the host's `<port>`.
