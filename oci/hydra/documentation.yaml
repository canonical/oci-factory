version: 2
application: hydra
description: |
  Ory Hydra is a hardened, OpenID Certified OAuth 2.0 Server and OpenID Connect Provider
  optimized for low-latency, high throughput, and low resource consumption.
  Ory Hydra enables you to become an OAuth 2.0 and OpenID Connect provider. 
  If you're not writing a basic web app but something that has to work on different devices, 
  that has machine-2-machine interaction, or enables third-party developers to use your API 
  (and pay for it), then this is what you're looking for.
website: https://github.com/ory/hydra
issues: https://github.com/canonical/hydra-rock/issues
source-code: https://github.com/canonical/hydra-rock

docker:
  parameters: >-
    -p 4444:4444
    -p 4445:4445
  run_conclusion: |
    Access the Hydra Public API at `http://localhost:4444`, Admin API at `http://localhost:4445`.

config:
  TRACING_ENABLED:
    type: env
    description: Tracing enablement, e.g., `true`.
  TRACING_PROVIDER:
    type: env
    description: Tracing protocol to be used, e.g., `otel`.
  TRACING_PROVIDERS_OTLP_INSECURE:
    type: env
    description: Allow Tracing via non TLS/insecure communication, e.g., `true`.
  TRACING_PROVIDERS_OTLP_SAMPLING_SAMPLING_RATIO:
    type: env
    description: Tracing sampling ratio, e.g., `1.0`.
  TRACING_PROVIDERS_OTLP_SERVER_URL:
    type: env
    description: Tracing server url and port, e.g., `tempo.server.io:4318`.
  '`-v <path>:/hydra.yaml`':
    type: mount
    description: >-
      Hydra config contains all the information needed to successfully configure it as an OIDC
      Provider, see https://github.com/ory/hydra/blob/master/internal/config/config.yaml as a reference
  '`-p <port>:4444`':
    type: port
    description: Expose Hydra Public API port 4444 on the host's `<port>`.
  '`-p <port>:4445`':
    type: port
    description: Expose Hydra Admin API port 4445 on the host's `<port>` .
  '`--args hydra -- serve all --config /hydra.yaml`':
    type: app
    description: >-
      Launch Hydra web server(s) using a mix of environment variables and the config mounted via volume.
