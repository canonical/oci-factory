version: 1
# --- OVERVIEW INFORMATION ---
application: litmuschaos-exporter
description: >
  Litmus chaos exporter is a Prometheus exporter for LitmusChaos experiments.
  It scrapes Kubernetes ChaosResult resources and exposes experiment metrics,
  enabling monitoring and alerting on chaos experiment outcomes.
  Read more in the [official documentation](https://github.com/litmuschaos/litmus).
  Please note that this repository holds a rock instead of a Dockerfile-based image.
  As such, the entrypoint is Pebble.
  Read more in the [Rockcraft docs](https://canonical-rockcraft.readthedocs-hosted.com/en/latest/).
# --- USAGE INFORMATION ---
docker:
  parameters:
    - -p 8080:8080
  access: Access Prometheus metrics at `http://localhost:8080/metrics`.
parameters:
  - type: -e
    value: 'WATCH_NAMESPACE=<namespace>'
    description: Kubernetes namespace to watch for ChaosResult resources. Watches all namespaces if unset.
  - type: -e
    value: 'CLUSTER_NAME=<name>'
    description: Name of the cluster, used as a label in exported CloudWatch metrics.
  - type: -e
    value: 'APP_NAME=<name>'
    description: Application name, used as a label in exported CloudWatch metrics.
  - type: -p
    value: '8080:8080'
    description: Access Prometheus metrics at `http://localhost:8080/metrics`.
debug:
  text: |
    ### Debugging

    To inspect the running service:
    ```bash
    docker exec -it <container> pebble logs -f chaos-exporter
    ```
