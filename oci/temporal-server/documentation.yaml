version: 2
application: temporal server
description: |
  Temporal is a durable execution platform that enables developers to build scalable
  applications without sacrificing productivity or reliability. The Temporal server
  executes units of application logic called Workflows in a resilient manner that
  automatically handles intermittent failures, and retries failed operations.
website: https://github.com/temporalio/temporal
issues: https://github.com/canonical/temporal-rocks/issues
source-code: https://github.com/canonical/temporal-rocks

docker:
  parameters: >-
     -p 7233:7233
     -e SQL_HOST=1.2.3.4
     -v /path/to/temporal/config.yaml:/etc/temporal/config/config.yaml
  run_conclusion: |
    Temporal server starts and listens on its configured ports.

config:
  TEMPORAL_ROOT:
    type: env
    description: temporal server is configurable with a root directory for the execution environment.
    default: /etc/temporal
  TEMPORAL_CONFIG_DIR:
    type: env
    description: temporal server is configurable with a config directory path relative to the Temporal root.
    default: config
  TEMPORAL_ENVIRONMENT:
    type: env
    description: temporal server is configurable with a runtime Temporal environment.
    default: development
  TEMPORAL_AVAILABILITY_ZONE:
    type: env
    description: temporal server is configurable with an availability zone value.
    default: some-zone
  TEMPORAL_ALLOW_NO_AUTH:
    type: env
    description: temporal server is configurable to allow running without an authorizer.
    default: 'false'
  SQL_HOST:
    type: env
    description: temporal server is configurable with the SQL host used by temporal-sql-tool.
    default: 1.2.3.4
  SQL_PORT:
    type: env
    description: temporal server is configurable with the SQL port used by temporal-sql-tool.
    default: '3306'
  SQL_USER:
    type: env
    description: temporal server is configurable with the SQL user used by temporal-sql-tool.
    default: mysql
  SQL_PASSWORD:
    type: env
    description: temporal server is configurable with the SQL password used by temporal-sql-tool.
    default: supersecretpassword
  SQL_DATABASE:
    type: env
    description: temporal server is configurable with the SQL database name used by temporal-sql-tool.
    default: temporal
  SQL_PLUGIN:
    type: env
    description: temporal server is configurable with the SQL plugin used by temporal-sql-tool.
    default: mysql
  SQL_CONNECT_ATTRIBUTES:
    type: env
    description: temporal server is configurable with SQL connect attributes used by temporal-sql-tool.
  SQL_TLS:
    type: env
    description: temporal server is configurable to enable TLS over SQL connections.
    default: 'true'
  SQL_TLS_CERT_FILE:
    type: env
    description: temporal server is configurable with an SQL TLS client certificate path.
    default: /path/to/client.crt
  SQL_TLS_KEY_FILE:
    type: env
    description: temporal server is configurable with an SQL TLS client key path.
    default: /path/to/client.key
  SQL_TLS_CA_FILE:
    type: env
    description: temporal server is configurable with an SQL TLS client CA file path.
    default: /path/to/client-ca.crt
  SQL_TLS_SERVER_NAME:
    type: env
    description: temporal server is configurable with an SQL TLS server name override.
    default: test-server-name
  SQL_TLS_DISABLE_HOST_VERIFICATION:
    type: env
    description: temporal server is configurable to disable SQL TLS host name verification.
    default: 'true'
  TEMPORAL_CLI_ADDRESS:
    type: env
    description: temporal server is configurable with host and port for tdbg frontend access.
    default: 1.2.3.4:5555
  TEMPORAL_CLI_NAMESPACE:
    type: env
    description: temporal server is configurable with the Temporal workflow namespace used by tdbg.
    default: testnamespace
  TEMPORAL_CONTEXT_TIMEOUT:
    type: env
    description: temporal server is configurable with an RPC context timeout in seconds for tdbg.
    default: '10'
  TEMPORAL_CLI_TLS_CERT:
    type: env
    description: temporal server is configurable with an x509 certificate path used by tdbg.
    default: /path/to/tls.cert
  TEMPORAL_CLI_TLS_KEY:
    type: env
    description: temporal server is configurable with a private key path used by tdbg.
    default: /path/to/tls.key
  TEMPORAL_CLI_TLS_CA:
    type: env
    description: temporal server is configurable with a server CA certificate path used by tdbg.
    default: /path/to/server-ca.crt
  TEMPORAL_CLI_TLS_DISABLE_HOST_VERFICATION:
    type: env
    description: temporal server is configurable to disable TLS host name verification for tdbg.
    default: 'true'
  '`-v <path>:/etc/temporal/config/config.yaml`':
    type: mount
    description: temporal server is configurable with a mounted configuration file path.
  '`-p <port>:6933`':
    type: port
    description: temporal server is configurable to expose the frontend service membership endpoint.
  '`-p <port>:6934`':
    type: port
    description: temporal server is configurable to expose the history service membership endpoint.
  '`-p <port>:6935`':
    type: port
    description: temporal server is configurable to expose the matching service membership endpoint.
  '`-p <port>:6939`':
    type: port
    description: temporal server is configurable to expose the worker service membership endpoint.
  '`-p <port>:7233`':
    type: port
    description: temporal server is configurable to expose the frontend service gRPC endpoint.
  '`-p <port>:7243`':
    type: port
    description: temporal server is configurable to expose the frontend service HTTP endpoint.
  '`-p <port>:7234`':
    type: port
    description: temporal server is configurable to expose the history service gRPC endpoint.
  '`-p <port>:7235`':
    type: port
    description: temporal server is configurable to expose the matching service gRPC endpoint.
  '`-p <port>:7239`':
    type: port
    description: temporal server is configurable to expose the worker service gRPC endpoint.
  '`--detach`':
    type: other
    description: temporal server is runnable in detached mode.
  '`--name <container-name>`':
    type: other
    description: temporal server is runnable with a custom container name.
