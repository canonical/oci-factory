version: 2

application: dotnet-runtime
description: |
  .NET is a free, cross-platform, open source developer platform for building many different types of applications. With .NET, you can use multiple languages, editors, and libraries to build for web, mobile, desktop, games, IoT, and more.
  Read [the .NET documentation](https://docs.microsoft.com/en-us/dotnet/core/deploying/) to learn how to deploy your .NET application with container images.

  ### About Chiselled Ubuntu

  **This image does not include bash nor a package manager nor the .NET SDK.**
  Read more about Chiselled Ubuntu for .NET, a new class of OCI images, on [the Ubuntu blog](https://ubuntu.com/blog/install-dotnet-on-ubuntu); reading how Canonical and Microsoft partner together to deliver and support .NET on Ubuntu.

  If you're looking to publish a self-contained .NET app, please have a look at the `ubuntu/dotnet-deps` repository.
  If you're looking to publish an ASP.NET app, please then look at the `ubuntu/dotnet-aspnet` repository.

docker:
  parameters: -e TZ=UTC
  run_cmd: exec dotnet
  run_conclusion: |
    The container logs simply show the .NET help message.
    This is because the container expects a .NET application to be given.

  dockerfile: |
    Here is an example using a Dockerfile to build a .NET application image on top of a dotnet-runtime image:

    #### For rocks (9.0-25.04 and later)

    ```bash
    # Create a HelloWorld.csproj file with the following content
    $ cat <<EOF > HelloWorld.csproj
    <Project Sdk="Microsoft.NET.Sdk">

      <PropertyGroup>
        <OutputType>Exe</OutputType>
        <TargetFramework>net10.0</TargetFramework>
        <ImplicitUsings>enable</ImplicitUsings>
        <Nullable>enable</Nullable>
      </PropertyGroup>

    </Project>
    EOF

    # Create a Program.cs file with the following code
    $ cat <<EOF > Program.cs
    Console.WriteLine("Hello, World!");
    EOF
    ```

    Create a Dockerfile with the following content:

    ```Dockerfile
    FROM ubuntu:26.04 AS builder

    RUN apt-get update && apt-get install -y dotnet10 ca-certificates

    # add your application code
    WORKDIR /source
    COPY . .

    # publish your .NET app
    RUN dotnet publish -c Release -o /app

    FROM ubuntu/dotnet-runtime:10.0-26.04_edge

    WORKDIR /app
    COPY --from=builder /app ./

    CMD ["exec", "dotnet", "/app/HelloWorld.dll"]
    ```

    Build and run the image with the following commands:

    ```bash
    $ docker build -t hello-world-app .
    $ docker run --rm hello-world-app  # This prints "Hello, World!"
    ```

    #### For Legacy images (6.0, 8.0, 9.0-24.10)
    ```bash
    # Using .NET8 as an example
    # Create a HelloWorld.csproj file with the following content
    $ cat <<EOF > HelloWorld.csproj
    <Project Sdk="Microsoft.NET.Sdk">

      <PropertyGroup>
        <OutputType>Exe</OutputType>
        <TargetFramework>net8.0</TargetFramework>
        <ImplicitUsings>enable</ImplicitUsings>
        <Nullable>enable</Nullable>
      </PropertyGroup>

    </Project>
    EOF

    # Create a Program.cs file with the following code
    $ cat <<EOF > Program.cs
    Console.WriteLine("Hello, World!");
    EOF
    ```

    Create a Dockerfile with the following content:

    ```Dockerfile
    FROM ubuntu:24.04 AS builder

    # install the .NET 8 SDK from the Ubuntu archive
    # (no need to clean the apt cache as this is an unpublished stage)
    RUN apt-get update && apt-get install -y dotnet8 ca-certificates

    # add your application code
    WORKDIR /source
    COPY . .

    # publish your .NET app
    RUN dotnet publish -c Release -o /app

    FROM ubuntu/dotnet-runtime:8.0-24.04_beta

    WORKDIR /app
    COPY --from=builder /app ./

    ENTRYPOINT ["dotnet", "/app/HelloWorld.dll"]
    ```

    Build and run the image with the following commands:

    ```bash
    $ docker build -t hello-world-app .
    $ docker run --rm hello-world-app  # This prints "Hello, World!"
    ```

  legacy:
    parameters: -e TZ=UTC
    run_conclusion: |
      The container logs shows the .NET runtime information, as the container has `/usr/bin/dotnet` as the entrypoint,
      and `--info` as the default argument.

website: https://dotnet.microsoft.com/
issues: https://github.com/canonical/dotnet-runtime-rock/issues
source-code: https://github.com/canonical/dotnet-runtime-rock

config:
  TZ:
    description: Set the timezone for the container
    type: env
    default: UTC
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT:
    description: Whether to use invariant globalization mode.
    type: env
    default: 'true'
  ASPNETCORE_URLS:
    description: The URLs that the ASP.NET Core app should listen on.
    type: env
    default: 'http://+:8080'

override_tracks:
  # Tracks release from legacy repo
  6.0-22.04:
    end-of-life: '2024-11-12T00:00:00Z'
  6.0-22.10:
    end-of-life: '2023-07-20T00:00:00Z'
  7.0-22.10:
    end-of-life: '2023-07-20T00:00:00Z'
  7.0-23.04:
    end-of-life: '2024-05-14T00:00:00Z'
  8.0-24.04:
    end-of-life: '2026-11-10T00:00:00Z'
  9.0-24.10:
    end-of-life: '2025-07-10T00:00:00Z'
  # Tracks with different tag than build-base
  9.0-25.04:
    end-of-life: '2026-01-15T00:00:00Z'
