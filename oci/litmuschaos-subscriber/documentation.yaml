version: 1
# --- OVERVIEW INFORMATION ---
application: litmuschaos-subscriber
description: >
  Litmus subscriber is an execution-plane agent that connects to the Litmus ChaosCenter via WebSocket.
  It runs inside a target Kubernetes cluster and relays chaos experiment status and results back to ChaosCenter.
  Read more in the [official documentation](https://github.com/litmuschaos/litmus).
  Please note that this repository holds a rock instead of a Dockerfile-based image.
  As such, the entrypoint is Pebble.
  Read more in the [Rockcraft docs](https://canonical-rockcraft.readthedocs-hosted.com/en/latest/).
debug:
  text: |
    ### Debugging

    To inspect the running service:
    ```bash
    docker exec -it <container> pebble logs -f subscriber
    ```
