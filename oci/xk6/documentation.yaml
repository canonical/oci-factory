version: 2
application: xk6
description: |
  Grafana k6 is an open-source, developer-friendly, and extensible
  load testing tool. k6 allows you to prevent performance issues and
  proactively improve reliability.
website: https://grafana.com/docs/k6/
issues: https://github.com/canonical/xk6-rock/issues
source-code: https://github.com/canonical/xk6-rock

docker:
  parameters: >-
    -p 6565:6565
  run_conclusion: |
    Access the k6 instance at `http://localhost:6565`.

config:
  TZ:
    type: env
    description: Timezone.
    default: 'UTC'
  '`-p <port>:6565`':
    type: port
    description: Expose the container's port `6565` on the host's `<port>`.
