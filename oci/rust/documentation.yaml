version: 2

application: Rust
description: |
  Rust is a modern memory-safe systems programming language focused on performance and reliability.
website: https://www.rust-lang.org/
issues: https://github.com/canonical/rust-rock/issues
source-code: https://github.com/canonical/rust-rock

docker:
  parameters: --rm -v /path/to/your/rust/project:/work -w /work
  run_cmd: exec cargo build --release
  run_conclusion: |
    The project within the current working directory will be built with Cargo.
    The resulting binary will be placed in the current working directory.

override_tracks:
  # Tracks with different tag than build-base
  1.84-25.04:
    end-of-life: '2026-01-15T00:00:00Z'
