version: 2
application: valkey
description: |
  This is an OCI image that bundles Valkey together with the metrics exporter.
  Valkey is an open source, flexible distributed key-value datastore that is
  optimized for caching and other realtime workloads.
website: https://valkey.io/
issues: https://github.com/canonical/charmed-valkey-rock/issues
source-code: https://github.com/canonical/charmed-valkey-rock

docker:
  parameters: >-
    -p 6379:6379
  run_conclusion: |
    Access the Valkey server at `http://localhost:6379`.

    Commands can be run using `valkey-cli` inside the container, e.g., to check Valkey's status:
    ```shell
    $ docker exec valkey-container valkey-cli ping
    ```

config:
  TZ:
    type: env
    description: Timezone.
    default: 'UTC'
  '`-v <volume>:/var/lib/valkey`':
    type: mount
    description: Valkey Server's data directory. A config file can be mounted here to configure Valkey.
  '`-p <port>:6379`':
    type: port
    description: Expose the container's port `6379` on the host's `<port>`.