version: 2

application: go
description: |
  Go is an open source programming language that makes it easy to build simple, reliable, and efficient software.

  This contains a minimal Go toolchain which can be used to build a wide variety of Go applications.
  It also includes a minimal GCC toolchain to build the Go applications that have C dependencies.

  Any additional dependencies can be either mounted at runtime or installed with the apt installation included in this rock.

docker:
  parameters: --rm -v /path/to/your/go/project:/work -w /work
  run_cmd: exec go build /path/to/target
  run_conclusion: |
    The project within the current working directory will be built with the `go build` command.
    The resulting binary will be placed in the current working directory.

config:
  GOTOOLCHAIN:
    type: env
    default: 'local'
    description: |
      The Go toolchain to use.


website: https://go.dev/
source-code: https://github.com/canonical/golang-rock
issues: https://github.com/canonical/golang-rock/issues
override_tracks:
  1.24-25.04:
    end-of-life: '2026-01-15'
