version: 2
application: postgres
description: |
  PostgreSQL is a powerful, open source object-relational database system.
  It has more than 20 years of active development and a proven architecture that
  has earned it a strong reputation for reliability, data integrity, and correctness.
website: https://www.postgresql.org/
issues: https://github.com/canonical/postgresql-rock/issues
source-code: https://github.com/canonical/postgresql-rock

docker:
  parameters: >-
    -d
    -e TZ=UTC
    -e POSTGRES_PASSWORD=My:S3cr3t
    -p 30432:5432
  run_conclusion: |
    Access your PostgreSQL server at `localhost:30432`.

config:
  TZ:
    type: env
    description: Timezone.
    default: 'UTC'
  POSTGRES_PASSWORD:
    type: env
    description: Set the password for the superuser (postgres by default). This option is mandatory and must not be empty. Required to connect from external hosts, e.g., `my_secret_password`.
  POSTGRES_USER:
    type: env
    description: Create a new user with superuser privileges, e.g., `john`. Used in conjunction with POSTGRES_PASSWORD.
  POSTGRES_DB:
    type: env
    description: Set the name of the default database, e.g., `db_test`.
  POSTGRES_INITDB_ARGS:
    type: env
    description: Pass arguments to the postgres initdb call, e.g., `--data-checksums`.
  POSTGRES_INITDB_WALDIR:
    type: env
    description: Set the location of the Postgres transaction log. By default it is stored in a subdirectory of the main Postgres data folder (PGDATA).
  POSTGRES_HOST_AUTH_METHOD:
    type: env
    description: Set the auth-method for host connections for all databases, all users, and all addresses. The following will be added to the pg_hba.conf if this option is passed 'host all all all $POSTGRES_HOST_AUTH_METHOD'.
  PGDATA:
    type: env
    default: /var/lib/postgresql/data
    description: Set the location of the database files.
  '`-v <path>:/etc/postgresql/postgresql.conf`':
    type: mount
    description: Local configuration file postgresql.conf.
  '`-v <path>:/var/lib/postgresql/data`':
    type: mount
    description: Persist data instead of initializing a new database every time you launch a new container.
  '`-p <port>:5432`':
    type: port
    description: Expose the container's port `5432` on the host's `<port>`.
