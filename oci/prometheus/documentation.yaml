version: 2
application: prometheus
description: |
  Prometheus is a systems and service monitoring system. It collects metrics
  from configured targets at given intervals, evaluates rule expressions,
  displays the results, and can trigger alerts if some condition is observed
  to be true.
website: https://prometheus.io/
issues: https://github.com/canonical/prometheus-rock/issues
source-code: https://github.com/canonical/prometheus-rock

docker:
  parameters: >-
    -p 9090:9090
  run_conclusion: |
    Prometheus starts on port 9090.
    Access your Prometheus instance at `http://localhost:9090`.

config:
  TZ:
    type: env
    description: Timezone.
    default: 'UTC'
  '`-v <path>:/etc/prometheus/prometheus.yml`':
    type: mount
    description: Local configuration file prometheus.yml.
  '`-v <path>:/etc/prometheus/alerts.yml`':
    type: mount
    description: Local alerts configuration file alerts.yml.
  '`-p <port>:9090`':
    type: port
    description: Expose Prometheus on localhost:9090.
